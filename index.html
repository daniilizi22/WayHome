  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0d0b;
      --bg2: #141310;
      --ink: #e8e0d0;
      --ink-muted: #7a7060;
      --ink-faint: #2e2c28;
      --gold: #c9a84c;
      --gold-dim: #7a6230;
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Свеча — фоновое свечение */
    body::before {
      content: '';
      position: fixed;
      top: -10vh;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 500px;
      background: radial-gradient(ellipse at 50% 20%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      padding: 2rem 2.5rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--ink-faint);
      animation: fadeDown 1s ease both;
    }

    .brand h1 {
      font-family: 'Cormorant SC', serif;
      font-weight: 300;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .brand p {
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-muted);
      margin-top: 0.25rem;
      letter-spacing: 0.05em;
    }

    .header-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--ink-faint);
      color: var(--ink-muted);
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      font-size: 0.9rem;
    }

    .btn-icon:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.5rem 3rem;
      gap: 2rem;
    }

    .poem-label {
      text-align: center;
      animation: fadeUp 1s 0.3s ease both;
    }

    .poem-label .tag {
      font-family: 'Cormorant SC', serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .poem-label .date {
      font-style: italic;
      font-size: 1rem;
      color: var(--ink-muted);
      margin-top: 0.4rem;
    }

    .poem-label .ornament {
      color: var(--gold-dim);
      font-size: 1rem;
      margin-top: 0.6rem;
    }

    /* POEM */
    .poem-wrap {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    article {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      animation: fadeUp 1.2s 0.5s ease both;
    }

    .stanza {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .stanza span {
      font-size: clamp(0.88rem, 2.2vw, 1.2rem);
      font-weight: 300;
      line-height: 1.7;
      letter-spacing: 0.03em;
      color: var(--ink);
    }

    /* NAV ARROWS */
    .poem-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      animation: fadeUp 1s 1s ease both;
    }

    .btn-nav {
      background: none;
      border: 1px solid var(--ink-faint);
      color: var(--ink-muted);
      width: 3.4rem;
      height: 3.4rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, border-color 0.2s, transform 0.15s;
      font-size: 1.3rem;
    }

    .btn-nav:hover {
      color: var(--ink);
      border-color: var(--ink-muted);
      transform: scale(1.08);
    }

    .poem-counter {
      font-family: 'Cormorant SC', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--ink-muted);
      min-width: 5rem;
      text-align: center;
    }

    /* ACTION BUTTONS */
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 1s 1.5s ease both;
    }

    .btn-pill {
      background: none;
      border: 1px solid var(--ink-faint);
      color: var(--ink-muted);
      padding: 0.6rem 1.4rem;
      border-radius: 99px;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      transition: color 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-pill:hover {
      color: var(--ink);
      border-color: var(--ink-muted);
    }

    .btn-today {
      color: var(--gold-dim);
      border-color: var(--gold-dim);
    }

    .btn-today:hover {
      color: var(--gold);
      border-color: var(--gold);
    }

    /* ARCHIVE DRAWER */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(480px, 100vw);
      height: 100dvh;
      background: var(--bg2);
      border-left: 1px solid var(--ink-faint);
      z-index: 101;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 1.8rem 2rem 1.2rem;
      border-bottom: 1px solid var(--ink-faint);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }

    .drawer-header h2 {
      font-family: 'Cormorant SC', serif;
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: 0.25em;
    }

    .drawer-header p {
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-top: 0.3rem;
    }

    .drawer-body {
      overflow-y: auto;
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
    }

    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-track { background: transparent; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

    .archive-poem .num {
      font-family: 'Cormorant SC', serif;
      font-size: 0.85rem;
      color: var(--gold-dim);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .archive-poem .num::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--ink-faint);
    }

    .archive-poem article {
      animation: none;
      gap: 1.2rem;
    }

    .archive-poem article .stanza span {
      font-size: 1.3rem;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-style: italic;
      font-size: 0.8rem;
      color: var(--ink-faint);
      border-top: 1px solid var(--ink-faint);
      animation: fadeUp 1s 2s ease both;
    }

    /* TRANSITIONS */
    .poem-wrap {
      transition: opacity 0.3s, transform 0.3s;
    }

    .poem-wrap.fading {
      opacity: 0;
      transform: translateY(6px);
    }

    /* PRINT */
    @media print {
      header .header-controls, .poem-nav, .actions, footer { display: none; }
      body { background: white; color: black; }
      body::before { display: none; }
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      header { padding: 1.2rem 1.2rem 1rem; }
      .drawer-body { padding: 1.2rem; }
    }

    @media (max-width: 600px) {
      .stanza span {
        font-size: 1.15rem;
        line-height: 1.8;
        white-space: normal;
      }
      article {
        gap: 2rem;
        text-align: left;
        padding: 0 0.5rem;
      }
      .poem-wrap {
        max-width: 100%;
      }
      main {
        padding: 0.5rem 1rem 2rem;
        gap: 1.5rem;
      }
    }

    @media (max-width: 600px) {
      .stanza span {
        font-size: 1.15rem;
        line-height: 1.8;
        white-space: normal;
      }
      article {
        gap: 2rem;
        text-align: left;
        padding: 0 0.5rem;
      }
      .poem-wrap {
        max-width: 100%;
      }
      main {
        padding: 0.5rem 1rem 2rem;
        gap: 1.5rem;
      }
    }
  </style>
</head>

,", "Служит ангелов нам рать,", "Чтоб вернуть с плодами жизни", "И любовь Его познать."]]}, {"id": 4, "stanzas": [["Опускаясь на колени", "И смотря Ему в глаза,", "Проливая слёзы сердца,", "Не забудь же ты сказать:"], ["Как не знал покоя в жизни", "До принятия Пути,", "Как искал ты в мире смыслы", "И страдал, считая дни."], ["Ждал с Отцом ты этой встречи,", "И когда же, наконец,", "Ты проснёшься, обретая", "Смысл бытия сердец?"], ["Взгляд Его очей любимых,", "Любящего сердца стук,", "Рук простёртые объятья", "Ждут тебя, мой милый друг."]]}, {"id": 5, "stanzas": [["В оголтелом состоянии", "Выношу сор из избы,", "Оставляя память жизни,", "Проливая кровь вины."], ["Искупавшись в словоблудии,", "Становлюсь гордыне рад.", "Что даёт мне облик умный?", "Лишь загадочный наряд."], ["В тёмном, диком маскараде,", "Где сознание спит порой,", "Пробуждаемся от сна мы,", "Чтоб найти пути Домой."]]}, {"id": 6, "stanzas": [["Приходил Он — не узнали,", "Били, плюнули в лицо,", "Осудили и распяли,", "Наградив Его венцом."], ["Из шипов нашей гордыни,", "Из гвоздей наших грехов", "Распинаем Бога-Сына,", "Отвергая жизнь-любовь."], ["И спустя тысячелетия", "Он приходит к нам в сердца,", "Призывая к жизни вечной", "И наследию Отца."], ["Не проспите этот голос,", "Не старайтесь заглушить.", "Через наше покаяние", "Сможем Бога воскресить!"]]}, {"id": 7, "stanzas": [["Математика простая:", "Покаянье — это раз,", "Два — Причастие Святое,", "Три — прощение проказ."], ["В этой школе нашей жизни,", "По прибытии домой,", "Аттестат мы получаем —", "Кто заслуживал какой."], ["Кто-то смог пройти красиво", "Жизни лестницу, пути,", "Кто-то пал и не поднялся,", "Не сумев сказать: «Прости!»"], ["И считая наши баллы,", "Выбирают нам места,", "Где поселят наши души.", "Школа жизни не проста."]]}, {"id": 8, "stanzas": [["Эй, братишка, успокойся,", "Осознание обрети:", "Что рубить с плеча не гоже —", "Потеряешь соль Пути."], ["Ведь значительно труднее", "В ножнах меч наш оставлять,", "Не калеча души близких,", "О прощении умолять."], ["Пелену преодолейте,", "Смойте паутину грёз —", "И не будете в ответе", "За ушат пролитых слёз."]]}, {"id": 9, "stanzas": [["В мире, где росток надежды", "Нужно в сердце поливать,", "Не получится как прежде", "На обочине стоять."], ["Изменение сознаний", "Даст дорогу нам вперёд,", "Многоликость состояний", "В сердце каждого живёт."], ["В радости, труде и миге", "Равновесье обрети,", "Напиши страницу книги,", "Жизни опыт не проспи."]]}, {"id": 10, "stanzas": [["Милостью Его прощаем,", "Совестью Его живём,", "И прощенье получаем —", "В реках жизни мы плывём."], ["Нет другого шанса в мире,", "Ценен лишь текущий миг.", "Завтра может не случиться,", "Прошлого растаял лик."], ["Время есть земная мера,", "Отведённая нам всем.", "Не получится вернуться,", "Наверстать объятий плен."], ["Действуй, радуйся, старайся", "Каждый день — в последний раз,", "Ведь не ведомы нам сроки,", "Призовут как скоро нас."], ["И не будет после больно,", "Что упущены миры,", "Что прожил ты серой мышью,", "Не познавши глубины:"], ["Неба, льющегося в сердце,", "Зова с глубины души,", "Глаз Его горящих искру,", "Свет неведомых вершин."]]}, {"id": 11, "stanzas": [["Так, теперь по сути песни,", "Что прослушали сейчас:", "Ты её пропел чудесно,", "Выставляя напоказ"], ["Все свои былые раны", "Нераскаянной души,", "Не построенные храмы,", "Молчаливо поспешив"], ["Сделать вывод, для чего мы", "Обитаем на Земле,", "Почему несём оковы", "Тел белковых на себе."], ["Не по шалости ли деткой,", "В ослушании Отца,", "Мы теперь с тобою бьёмся", "В Зазеркалье, не спеша"], ["Обрекли мы наши души", "На земной промозглый путь,", "Среди вечного распутья", "Зла — добра вкушая суть."], ["Но не брошены мы были,", "Не оставил нас Отец", "В этом Зазеркалье-мире,", "Дав ключи найти сердец,"], ["Чтобы с радостью вернуться,", "Принеся с собой плоды.", "Сыновей своих дождутся", "Нашей юности миры."]]}, {"id": 12, "stanzas": [["Милости прося у Бога,", "Покаяния в Пути,", "Собирайся ты в дорогу,", "Чтоб бесплодно не пройти"], ["Этот путь земной ступени,", "Этот детский сад души.", "Зацветёт цветами многих", "Откровений — не спеши"], ["Собирать плоды гордыни,", "Ядовитых ягод лжи.", "Ведь отравленное ложе", "Может выйти для души."], ["Удобряй делами чести,", "Поливай молитвой слёз,", "Жди, пока созреет сердце", "И родит дитя — цвет роз."], ["Ароматами нездешних", "Состояний снизойдёт", "Этот плод труда земного,", "Приглашая нас в полёт"], ["В те миры, где обитают", "Души старцев молодых,", "Где познаешь ты значение", "Прожитых мгновений — книг,"], ["Нами писанных в дороге", "За наследием Отца,", "Пережитые тревоги", "И раскрытые сердца."]]}, {"id": 13, "stanzas": [["Рай — не место, не подумай,", "Чтоб не потерять маяк.", "Это сфера состояний,", "Там живут не «где», а «как»."], ["Можешь ты при жизни этой", "Состояние ощутить,", "Мира горнего коснуться,", "Мига тонкого вкусить."], ["Но не все живут достойно,", "Чтоб отведать те миры.", "Кто-то может добровольно", "В ад спуститься, вылив лжи,"], ["Осуждения, лени, пьянства,", "Блуда, жадности грехи,", "Не туда свернув дорогой,", "Душу погрузив во мхи."], ["Пожиная бумеранги", "Прилетающих грехов,", "Озлобляясь и впадая", "В муки адские оков,"], ["Жить сознательно, попробуй,", "Понимание обрети:", "Что посеешь в мире этом —", "То вернётся на пути."]]}, {"id": 14, "stanzas": [["Понимая мысли наши", "Как познания маяки,", "Выбираем направление,", "Сеем мы в душе ростки."], ["Могут быть они посланцем", "Как от ангельских миров,", "Так и посланными бесом,", "Искушая для грехов."], ["Ведь приняв прилог гордыни,", "Опускаем душу в ад,", "И теперь без покаянья", "Не расчистим мы наш сад."], ["Не проспи прилогов яды,", "Чтоб не мучиться душе,", "Будь на страже своих мыслей,", "Научись понять уже:"], ["Чем питаешь своё сердце,", "Где ты будешь обитать,", "Что взрастим и что разрушим,", "То запишем мы в тетрадь."]]}, {"id": 15, "stanzas": [["В аромате цветов", "И закате игривом,", "В чаше жизни весов", "Мы встречаем Творца.", "Направляя в пути,", "Ждёт Он нас терпеливо,", "Светит в наших сердцах,", "Помогая дойти", "Сквозь туман бытия,", "Через чаши гордыни.", "Отвергая себя — принимая Его,", "Нас земной терпкий путь", "В благодати пустыни", "Проплываем в молчанье,", "Стараясь найти", "Той тропы узкий след", "Среди скал искушений,", "Что пройти суждено", "Лишь немногим из нас.", "Через Млечный наш путь,", "Оставляя в пучинах", "Кто не смог, был достоин", "Его обрести."]]}, {"id": 16, "stanzas": [["Он позвал меня: «Лазарь, выйди!»", "Здесь лежал я мёртвый три дня,", "Пели птицы, светило солнце,", "А толпа онемела вся —"], ["Поражённая даром Божьим,", "Порождённая Духом вся,", "Не поняв, что ведь каждый может", "Воскресить свою душу, любя."], ["Не распяв Его, не оставив", "Одного на кресте умирать,", "Но принять Его нашим сердцем", "И, спасая многих, сказать:"], ["«Слава, Сыне, Тебе за спасенье!", "За дарованный вектор домой!", "За Святое Твоё Воскресенье!", "И за жертву, что принял собой!»"]]}, {"id": 17, "stanzas": [["За основу создания мира", "Взял Отец наш любимый — дитя,", "Всех поставил служить нам Всесильный,", "Научить жизни вечной, любя."], ["Но не выдержав детский экзамен,", "Пали в мир Зазеркалья, во мглу,", "Где лишь Сына распяв, мы познали,", "Как вернуться обратно к Отцу."], ["По законам Его, по заветам", "И по совести, данной Отцом,", "Окормляя сей мир жизни светом,", "Освещая надежды венцом,"], ["Вновь открывшейся в нашем сердце —", "Душ раскаянных тропка домой,", "Проливая сознанье рассветом", "В небосводе звездой путевой."]]}, {"id": 18, "stanzas": [["Предстояние пред Богом", "В каждом миге бытия", "Открывает нам дорогу", "В состояние Огня,"], ["Что пылает в горнем мире,", "За пределами земли,", "Где несут служение духи", "В высшем секторе любви."], ["Обжигает он незрелых,", "Служит адом он для тех,", "Кто проспал всю жизнь земную,", "Лишь для тел познав утех."], ["Принимая пламя в душу,", "Сея зёрна тех миров,", "Направляй, чтобы разрушить", "Бремя собственных грехов."], ["Выполнение программы,", "С чем пришла сюда душа,", "Избавляет от пучины,", "Пробуждает ото сна."], ["По неведомым дорогам", "Поведут тебя вперёд,", "Открывая все завесы,", "Начинается полёт!"]]}, {"id": 19, "stanzas": [["Схождение Духа — сжигание праха,", "Застрявшего в нашей душе.", "Невидимо нас избавляют от плахи,", "Что ждала нас здесь в неглиже."], ["От мира приняв этот груз самомнения,", "Мы тихо брели в темноте,", "Рождая кумиров, творя беззакония,", "Не помня о чистой реке,"], ["С которой начался процесс восхождения", "В миры, где зачата душа.", "И ждут нас обратно, приняв воскресение, —", "Сумей лишь доплыть не спеша."]]}, {"id": 20, "stanzas": [["Неспетая песня, не сыграна свадьба", "Души с Женихом — вопреки", "Процессу заветного богопознания,", "Где много подсказок в пути."], ["Заложенных принципов всех в мироздании", "Могли мы не знать наперёд,", "Но сон беспробудный лишает сознание:", "Не спящий — под суд не пойдёт."], ["Украдено время, потеряны души,", "Пучина теперь впереди.", "На тверди земной неприкаянной суши", "Покой не дано обрести."]]}, {"id": 21, "stanzas": [["Не судья я — подсудимый,", "Как и все здесь на Земле.", "Душу грешную спасаем,", "Обретая свет во тьме."], ["Мы живём, не понимая,", "Что несём грехи отцов,", "В поколеньях собирая,", "Платим их как семь слепцов."], ["А попробуй-ка при жизни", "Разорвать порочный круг,", "В покаянии вспоминая", "Все деянья наших рук,"], ["Все отравленные мысли,", "Чувства, что несли порой", "Разрушения в души близких", "И проклятий яд живой."], ["И тогда своим мы детям", "Не отравим ядом жизнь,", "Будет путь их ярок, светел", "И чиста дорога ввысь."]]}, {"id": 22, "stanzas": [["Здесь летают наши души,", "Наши души — мотыльки.", "Не боясь сгореть, мы кружим", "И страдаем от тоски"], ["По невидимому дому,", "По обителям души.", "Продолжая танец жизни,", "К трансформации спешим."], ["Мы летим на лучик света,", "Познавая глубину", "Предрассветной тихой глади", "Нашей жизни здесь в миру,"], ["Чтоб взлететь и воплотиться", "В горнем мире у Отца", "Светлою душою-птицей,", "Трансформируясь в птенца."], ["Полетим мы в Отчем доме", "Стаей белых лебедей,", "Создавая грани новых", "Колыбелей для людей,"], ["Предваряя возвращение", "И наследуя Творца,", "Мы обители построим", "Нашим душам и сердцам."]]}, {"id": 23, "stanzas": [["Во снах черпая вдохновение,", "Летаем мы как наяву,", "Горим в любви Его безмерной,", "Не понимая почему"], ["Нас держит этот мир жестокий,", "Расплаты тяжкая печать", "За выбор сделанный — высокий,", "Завет нарушив: «Не вкушать»"], ["Плода отравленную мякоть.", "И опрокинув в пропасть мир,", "Не можем мы теперь не плакать,", "Попав на этот страшный пир."], ["Всему виной гордыня наша", "И шалость детского ума.", "Познать обрекли наши души", "Добро и зло теперь сполна."]]}, {"id": 24, "stanzas": [["Мир сжался до горчичного зерна,", "Война врасплох застала наши души,", "Немыслима была ещё вчера —", "Сегодня мир реальностью разрушив."], ["Сей доли не могли мы избежать,", "Весь свет забился в миге перехода.", "Себя распяв на мировом кресте,", "Меняем мы сознание народов."], ["Завещано нам всё преодолеть,", "Воскреснуть над войною в новом мире", "И осветить землянам путь вперёд", "В сражении с неравными по силе."]]}, {"id": 25, "stanzas": [["Здесь всюду голубые небеса", "И шум лесов, подаренных нам свыше.", "На травах по утрам теперь роса,", "Природа полной грудью рядом дышит."], ["Весна пришла желанной теплотой,", "И ветер сосны бережно колышет,", "Кругом цветы нас радуют красой,", "И птицы начинают петь всё выше."], ["Планета расцветает, как душа,", "Познав прохладу зимней лютой стужи,", "Чтоб возродиться к жизни не спеша,", "Чтоб подарить нам сладость мига — кружит."], ["Вдохнув лесной цветущий аромат,", "Приняв сей день открытыми очами,", "Мы осознание жизни получаем", "И откровение в сладости цитат,"], ["Произнесённых", "Юности устами", "Поэтов и великих мастеров,", "Пришедших в этот мир", "Принять скрижали", "Духовных наставлений и стихов,", "Что направляют жизнь по вертикали."]]}, {"id": 26, "stanzas": [["Все званы, избранных не много,", "Не все готовы отправляться в Путь", "И прочертить огнём в сердцах дорогу,", "Чтобы не сгинуть в захолустье пут."], ["Ведь не отсюда мы пришли с тобою,", "И не сюда нам нужно поспешить.", "Успеть дойти, чтобы не пасть без боя,", "Оставя душу в луже жизни гнить."], ["Опомнись — с глаз сорви оковы,", "Не прозябай, а бодрствуй, живи,", "И возвратишься в стае журавлиной", "На те стези, где избранных пути."]]}, {"id": 27, "stanzas": [["Заворожённою сказкой", "Представляем высший мир,", "Но стараемся напрасно:", "Детский ум ведь наш кумир."], ["И Небес лишь отражение", "Видим мы вокруг себя,", "Потому и плод рождаем", "Отражённого огня."], ["У рожденья колыбели,", "В пелене рассветных грёз,", "Мы купаемся в купели", "С лепестками диких роз."], ["Невдомёк нам заглянуть то", "За кулисы тех миров,", "Что пыльцою очень тонкой", "Кружит пламя наших снов."], ["Но при правильном настрое,", "Если в сердце заглянуть,", "Мы найдём пути-дороги,", "Направлений краткий путь."], ["Нужно лишь оставить мысли,", "Чувства отложить чуть-чуть —", "И тогда услышим лучик,", "Океана вестник — суть."], ["Станет вскоре получаться", "Принимать из тех высот", "Информацию, что тонко,", "Словно каплями, течёт."], ["Ты получишь наставленья,", "Как готовиться в полёт", "В мир, что предан был забвенью,", "А теперь домой зовёт."]]}, {"id": 28, "stanzas": [["Искрометно пролетают", "Годы жизни-бытия.", "Вот оказия какая:", "Понял я, что я — не я,"], ["Что, откинув самомнение,", "Остаётся лишь дитя,", "Малое, почти слепое,", "Бродит в темноте, ища:"], ["Для чего живёт на свете?", "Почему кругом пожар?", "Кто спасёт его и встретит?", "Кто придумал земной шар?"], ["Почему не полусферу,", "Пирамиду или куб?", "Прибыл я сюда откуда?", "Для чего? Зачем я тут?"]]}, {"id": 29, "stanzas": [["Бесталанных не бывает —", "Так устроен этот мир.", "Есть лишь те, кто спит пока что", "Или смыл талант в сортир."], ["Но не просто ведь даны нам", "Эти лучики души.", "Не закапывай таланты,", "Проявить их поспеши."], ["И вокруг изменишь мир ты", "По закону бытия:", "Что ты сеешь, тем потом же", "Будут потчевать тебя."], ["Если брызгаешь обидой", "Или самомнение льёшь —", "То потом ты в этот омут", "С головой себя окунёшь."], ["Наблюдай, что происходит,", "И сознательно живи —", "Сможешь поселиться в мире,", "Где цветут цветы любви."]]}, {"id": 30, "stanzas": [["Не живи в унынии вечном,", "Не создай печаль оков.", "Просыпайся ты с надеждой", "Среди мира облаков."], ["Наполняй дорогу жизни", "Светлым лучиком любви,", "Всем прощай обиды-ливни", "И гордыню в хвост гони."], ["Зацветёт тогда весною", "Плодородный сад души,", "Близкие отведать смогут", "Ароматный плод вершин."]]}, {"id": 31, "stanzas": [["Пиво пью, готовлю стейки,", "Собираюсь за бугор,", "Но порой мы попадаем", "На душевный разговор —"], ["Разговор про смыслы жизни,", "Для чего «топтать газон»,", "Неужели как мартышки", "В этом мире мы живём."], ["Собеседник наш прозрачно", "Сообщает о себе", "То нежданной аневризмой,", "То «случайным» ДТП."], ["Намекают нам доступно,", "Что пора бы прекращать", "Жить как дикобраз несчастный —", "То поесть, то в сон упасть."], ["Разглядеть дают причины", "Нашей жизни на Земле,", "По непознанным пучинам", "Душу проведя во мгле."], ["Понемногу понимаем,", "Для чего пришли сюда", "И как скоро испарятся", "Нашей юности года."], ["И тогда ответ запросят:", "«Где плоды? Что ты творишь?", "Почему ты, не внимая,", "До сих пор по жизни спишь?»"], ["Ведь подходит невзначай уж", "Сей командировки срок,", "А вернуться не готовым —", "Значит, что проспал урок."]]}, {"id": 32, "stanzas": [["Как, не зная правил жизни,", "Можешь ты беспечно плыть?", "Понимая механизмы,", "Будешь бережно рулить,"], ["Направление выбирая", "Своей жизни кораблю", "И, не мешкая, прощая,", "Не влезая в ту петлю,"], ["Что на шею уж закинул,", "Бессознательно живя.", "Здесь, бросая якорь в тину,", "Можно погубить себя."], ["Проложить душе фарватер", "Сможет лишь сознанья луч,", "В темноте который светит,", "Как маяк средь мрака туч."], ["Ленточку оберегая,", "Ты раскручиваешь путь,", "Что ведёт к подножью Рая,", "Понимая жизни суть."], ["Средь великих испытаний", "Проплываем мы в миру,", "Бурю жизни укрощая,", "Помогая кораблю"], ["Не наткнуться в океане", "На гордыню острых скал,", "Паруса не разрывая,", "Находя душе причал,"], ["Где не будут нам опасны", "Бури и штормов грома.", "Обретёшь ты в жизни счастье,", "Сможешь осушить трюма."]]}, {"id": 33, "stanzas": [["Иногда не видим знаки,", "Что уже у нас на лбу.", "Проще выстрадать по полной", "И видать себя в гробу,"], ["Чем услышать в своём сердце,", "Почему страдаешь ты,", "Где ошибки допускаешь", "И признать вины хвосты."], ["В покаянии вымыть душу,", "Очищая жизни нить,", "Милостью Его разрушить", "Путы все — и смело жить,"], ["Не боясь, что в подворотне", "Крыша упадёт на нас,", "Разрядив страданьем плоти", "Тяжкий груз наших проказ."], ["И живя осознавая,", "Новых узелков не плесть,", "На прощенье уповая,", "Чистоту души стеречь."]]}, {"id": 34, "stanzas": [["Запомни: гены — наши книги жизни,", "И ангелы в них записи ведут,", "Записывая там дела земные", "И мыслей отпечатки, краски чувств."], ["Ведь не спроста с тобою попадаем", "В те ситуации, что сверху нам даны,", "Чтобы стереть из генов или вгрязнуть,", "Приняв удар доказанной вины."], ["Поэтому за все те неудачи", "Должны себя мы прежде упрекнуть.", "Пройдёшь экзамен или напортачишь —", "И выбор делай сам, не обессудь."], ["Порой мы слышим на пути вопросы:", "«За что дитя страдальцем рождено?»", "И по земным, простым ведь нашим меркам,", "Безгрешным быть достойно лишь оно."], ["Но наши дети все несут то бремя,", "Что в генах мы закладываем им.", "И, переполнив чашу беспределом,", "Её мы выливаем прямо на них."], ["А можно ведь идти стезей другою", "И вымолить для деток светлый путь,", "Когда дают экзамен нам судьбою —", "Из книги жизни вычеркнуть ту муть."]]}, {"id": 35, "stanzas": [["Забрало с шелестом упало,", "Контроль над гневом потерял,", "Загнал свой мозг под одеяло —", "Теперь лишь ярость правит бал."], ["Из ниоткуда появился демон,", "Тобою начинает управлять,", "Как кукловод — он знает своё дело,", "Теперь его сложнее всё унять."], ["Кто не бывал в таких вот передрягах,", "Когда сквозь пелену не видно суть?", "Никто не вспомнит, где всё начиналось", "И как нам статус-кво теперь вернуть."], ["Ключ к обретению мира — это школа,", "Которая не каждому дойдёт.", "Ступенями взбираясь, понимаешь:", "Гордыня в каждом сердце здесь живёт."], ["Она ведь не спроста давно зовётся", "Материей для всех других грехов,", "И только сильному дано пробиться", "Сквозь путы от её стальных оков."]]}, {"id": 36, "stanzas": [["Те из нас, кто жизнь оставил", "И ушёл в свои миры,", "Не способны больше сами", "Повлиять на ход игры."], ["Покидая Землю эту,", "Попадаем мы на суд,", "Держим мы ответ по полной", "За деянья и за суть."], ["Если в жизни не успел ты", "Выполнить программу в срок,", "Земных благ насобирал-то,", "Но не выучил урок,"], ["Ведь с собою не оденешь", "Двух штанов ты в горний мир,", "Там плоды наши оценят —", "Не количество квартир,"], ["Тачек блеск или курорты,", "Что успел ты посетить,", "Декалитры алкоголя,", "Что успел за жизнь испить."], ["Можешь голым ты явиться,", "Не неся плодов души,", "И поселён после будешь", "В мир без света и вершин,"], ["До которых не добрался,", "Не попробовав порой", "Даже шага вверх осилить,", "Собирая скарб земной."], ["Но не всё так безнадёжно", "Для ушедшего туда:", "Могут вывести из мрака,", "Путы разрубив врага,"], ["По молитве за те души —", "Им прощаются грехи.", "Нужно только, чтобы близкий", "Попросил Его: «Прости!»"], ["Те, кто жив ещё, ведь могут", "За ушедших предстоять,", "Вымолить светлей дорогу,", "Душам грешным мир сыскать."]]}, {"id": 37, "stanzas": [["Как-то раз мне рассказали", "Занимательный пример,", "Как работают законы", "Внеземных высоких сфер."], ["Жил себе в миру парнишка,", "И за что не брался он —", "Получалось всё с пол-тыка,", "Был удачей награждён."], ["Оказалось, что ушедший", "Дед его монахом был", "И успел при жизни здешней", "Заслужить себе мундир"], ["Средь небесной высшей рати.", "Обитала та душа", "И потомкам освещала", "Жизни светом полоса."], ["Поселившись в светлом месте,", "Ходит к Богу на поклон", "За своих земных собратьев,", "Просит счастья в мире том."], ["И даётся им дорога", "Облегчённою ходой,", "Светел путь их в жизни этой", "За его молитвы в той."]]}, {"id": 38, "stanzas": [["Жизнь достойна быть прожита", "В радостном настрое дня.", "Взгляд ребёнка дарит мысли,", "Как беспечно быть, детям."], ["Как закатов и рассветов", "Можем мы черпать прилив", "И отведать в жизни этой", "Красоту души, вкусив"], ["В той морской волне прозрачной,", "Что прохладою манит,", "Принимая дар прекрасный,", "В каждой капле говорит,"], ["Открывая мира угол", "Той неведомой красой.", "Понимаем: что не просто", "Покрывается росой"], ["По утрам трав одеяло,", "Птиц распевы тех в лугах.", "Видим в жизни радость детства,", "Взгляд игривый в облаках."]]}, {"id": 39, "stanzas": [["Нос задрал — ведь думал, в дамках,", "Есть квартира, тачка, кэш,", "За границей ежегодно", "Загорает его плешь."], ["Но ведь может оказаться,", "Что мы меряем не тем", "И действительно рождаем", "Для души великий плен."], ["Ведь богатство — это ноша,", "И не каждому дано", "Вынести её, не пропив", "В себе Божье то зерно."], ["И бесплодною поганкой", "По итогу бытия", "Нас выкапывают с корнем", "На съедение змеям."]]}, {"id": 40, "stanzas": [["Среди звёзд заметны очи", "Наших преданных друзей,", "Что по жизни помогают", "Пробираться в чаще дней."], ["Нам дают они советы,", "Как пройти по жизни дням,", "Не проспать судьбы рассветы,", "Млечным следуя путям."], ["Как сломать иглу Кощея", "И злодея победить,", "Чтоб не сгинуть в этой сказке", "И красавицу влюбить."], ["Не блудя по чаще леса,", "А идти по нити снов,", "Замыкая жизни пьесу", "Среди сказки облаков."]]}, {"id": 41, "stanzas": [["Жил да был себе на свете,", "Под лучами таял лёд.", "Как в известном анекдоте —", "Лыж не снял, а спать прилёг."], ["Не рассчитывал бедняга,", "Что придётся дать ответ.", "Жизнь прошла вся в передрягах,", "Он пришёл — а снега нет."], ["Как теперь лыжню увидеть", "Среди луж и темноты?", "Не поедут по асфальту", "Лыжи, что готовил ты."], ["А сезон прошёл катанья,", "Капает весной капель.", "Жизнь проспал и не увидел,", "Что ушла зимы метель."], ["Надо в жизни-биатлоне", "Старт игры не прозевать —", "Не придётся в вечном стоне", "Лыжи по лету тягать."]]}, {"id": 42, "stanzas": [["Наши дети не внимают", "Тем словам, что говорим,", "Наши действия читают", "И живут согласно им."], ["Если говоришь одно ты,", "А живёшь совсем не так —", "Будешь наблюдать и в детях", "Своих действий явный знак."], ["Утром, вечером в молитве", "Ты о них упоминай,", "Проси детям наставлений,", "Богу их ты посвящай."], ["И не бейся ты в тревоге,", "Доверяй Отцу миров —", "Сложит Он для них дороги,", "Служит Он для них щитом."], ["Ведь никто так не сумеет", "Позаботиться о них,", "Обстоятельства все сложит,", "От несчастий защитит."], ["Будут радовать тебя же", "Их плоды, достаток, путь.", "По молитве твоей смогут", "В верном русле повернуть."]]}, {"id": 43, "stanzas": [["Иногда не можешь словом", "Достучаться в сердце ты.", "Мы живём умом-основой,", "Сердце пряча за щиты."], ["Если хочешь, но не знаешь,", "Как ближайшему помочь —", "Помолись о нём и станешь", "Освещать дорогу в ночь."], ["Нужные придут намёки,", "Мысли станут направлять,", "И, не ввязываясь в споры,", "Душу будешь выручать."], ["Мысли наши не случайны", "И приходят, как вода.", "Выбирать нам только стоит:", "Из какого пить ведра?"], ["Затхлого, гнилого ила", "С нижних призрачных миров", "Или жизни эликсира,", "Ангелы, что льют с основ."], ["По молитве можем выбрать", "Мы источник наш воды", "И сознательно не черпать", "Яда — вестника беды."]]}, {"id": 44, "stanzas": [["Все мы братья или сёстры,", "Потому что мы — одно.", "Ветхого Адама клетки", "Разлетелись, как в кино,"], ["По всему Земному шару", "Тысячами долгих лет.", "Мы приходим в мир вот этот", "Как паденья тяжкий след,"], ["Как завета нарушенье —", "Не вкушать запретный плод —", "И дало нам самомнение,", "Тел белковых тяжкий рок."], ["И теперь живём — стенаем,", "Познаём добро и зло,", "В ночь проклятья посылаем", "И прощенье просим днём."]]}, {"id": 45, "stanzas": [["По дороге нашей жизни", "Мы шагаем сквозь года", "И идём с толпою вместе,", "Думая, что все — Туда."], ["Но к Отцу ведёт не трасса,", "А лишь узкая тропа,", "Высоко в горах петляя", "Среди острых скал врага."], ["Потому толпа — не лучший", "Указатель на пути.", "Большинство и вовсе бредит", "И не знает, где найти"], ["Смысл жизни на планете,", "А порой — не хочет знать.", "Главное, чтоб сыто-пьяно,", "Беспроблемно жизнь проспать."], ["Если ты услышал Голос,", "Призывающий к Пути, —", "Ты ищи в сердцах горящих", "Знаки, где тропу найти."]]}, {"id": 46, "stanzas": [["Мир живёт согласно правил,", "Чтобы в хаос не упасть.", "В заповедях мы находим", "Откровений тех печать."], ["При рождении получает", "Каждый, так же, как и все,", "Совесть, что дана нам свыше,", "Как маяк для жизни сей."], ["Через этот «орган» сложный", "Сообщают нам всегда,", "Как мы верно выбираем", "Своей жизни берега."], ["А не слушая её, мы", "Попадаем в переплёт,", "Запивая алкоголем", "Боль, что совесть нам даёт."], ["Постарайся слушать Голос,", "Что подсказывает путь, —", "Сможешь с миром и задором", "Жизни сей познать всю суть."]]}, {"id": 47, "stanzas": [["То великое служение", "Мы не можем осознать:", "Омывает наши ноги", "Вся космическая рать."], ["Сам Господь, живя меж нами,", "Нам показывал пример:", "Если думаешь, что старший —", "То служить ты должен всем."], ["Омывал водою ноги", "Он Своим ученикам,", "Объясняя тайны службы", "В перевёрнутых мирах."], ["И, приняв сознаньем это,", "Начинаешь понимать,", "Сколь мы дороги для Бога.", "Как могли Его предать?"], ["Сын Его принял распятие,", "Чтобы нас — детей спасти,", "На кресте пережигая", "Поколений всех грехи."], ["И дорогу проложил Он", "Для стремящихся вперёд.", "Ведь до крестной Его смерти", "Душам было невдомёк,"], ["Как вернуться в дом забытый,", "Где сотворены были,", "Где нет ночи, горя, смерти,", "Нераскаянной вины."]]}, {"id": 48, "stanzas": [["В лунном поле при дороге", "Ты сидишь, не зная, что:", "Мы живём средь волн тревоги,", "Выпивая чашу снов."], ["И колышемся в спиралях,", "Зная подлинность Пути,", "Самомнением стирая", "Узкий путь своей души."], ["Здесь не видно тех печалей,", "Что уже нет смысла жечь.", "Постарайся лишь в начале", "На углу желаний лечь."], ["Говори без остановки,", "Зажигай без дыма ты,", "Оставляй патрон в винтовке,", "Не взрывай свои мосты."], ["И погибель не узнает,", "Где готовишься принять", "Постриг ты в дороге к Раю,", "Подвиг, что ты смог стяжать."]]}, {"id": 49, "stanzas": [["В замках, где живут порою", "Наши мысли в облаках,", "Опускается горою", "Первобытный, нижний страх:"], ["Страх, что утром не проснёшься,", "Что детей не сбережёшь,", "Что утюг забыл в розетке,", "Что неправильно живёшь."], ["Наши страхи — пища нижних,", "Потому дают они", "Разные такие мысли,", "Чтоб поужинать могли."], ["Есть один достойный страх лишь —", "Божьим он зовётся здесь,", "И не стыдно им бояться,", "Понимая: грешен весь."], ["Чтоб его слегка уменьшить,", "Можно выпить тишину,", "Заглянуть в глубины сердца,", "Вспоминая ту вину,"], ["Где заветы ты нарушил,", "Заповеди, где попрал,", "В тёмных уголках сознания,", "Мысли, блудом где страдал."], ["Через чудо — Покаянье", "Можем мы убрать топор,", "Что уже завис над плахой,", "И продолжить разговор."]]}, {"id": 50, "stanzas": [["Завтра, завтра, послезавтра", "Точно стану лучше я,", "Выберу дорогу в жизни,", "Брошу пить, скажу друзьям."], ["Может, даже брошу якорь", "За границей, у морей,", "Чтоб заткнуть скорее голос,", "Что мешает быту дней."], ["Он всё время призывает:", "«Отодвинь животный путь!»", "Ведь не только как макака", "Можешь мир вперёд толкнуть,"], ["Пищей, сном и размножением,", "Как животные почти.", "Сам процесс деторождения", "Не спасает от вины."], ["И не стоит уповать лишь,", "Что детей ты воспитал.", "Это — да, но ведь таланты,", "С чем пришёл, ты закопал,"], ["Не пролив алмазной гранью", "В мире капельки души,", "Не зачав плодов нездешних —", "Сдаться быстро поспешил."], ["Никогда живым не поздно", "Отправляться в этот путь.", "Лишь ушедши ты не сможешь", "Больше ничего вернуть."]]}, {"id": 51, "stanzas": [["Сей войны слышны тревоги", "В каждом уголке Земли,", "Просыпаются сознания,", "Непрощённых смыслов сны."], ["Он ведь моет наши души", "В этом озере Огня,", "Спящих будит до рассвета,", "Проявить спешит Себя"], ["В каждом бого-человеке,", "Гранью, данною ему.", "Всем слепцам даёт услышать,", "Всем глухим — увидеть мглу,"], ["Похороненную в генах,", "В поколеньях спящих ниц.", "Жизни смысл течёт по венам", "Крови нашей вне границ."]]}, {"id": 52, "stanzas": [["Прикормив пираний стаю", "Плотью собственной души,", "Мы грехами обрастаем,", "На рыбалку не спешим."], ["Не так много ведь осталось", "Им доесть тебя совсем.", "Прояви хотя бы жалость,", "Побори душевный плен."], ["В книгах-лучиках сознанья", "Житие дано Святых,", "Что прожили в жизни этой,", "След в веках свой поселив."], ["Они нам дают примеры,", "Жизни векторы, путя,", "Очищения молитвой,", "Таинств светлое дитя."], ["Не пройти ведь в одиночку", "Этот непростой урок.", "Нужно выбрать мига точку,", "Где Учитель твой живёт,"], ["Направляемый любовью.", "Сможешь ты гранит разгрызть", "Неземной науки этой,", "Алфавиты изучить."]]}, {"id": 53, "stanzas": [["Замирает наше сердце,", "Забирают нас порой", "Поселиться в светлом месте,", "Где душе дают покой."], ["За плечами жар ступеней,", "Пред глазами смысла быль,", "Непрощённых каруселей", "Затерявшихся картин."], ["Вот он миг, который снился,", "Вот живой исход души,", "И, не веря, приключился —", "И не вовремя решил."], ["Открываются основы,", "Округляются глаза,", "Неописанные вещи,", "Что не могут предсказать."], ["Жизнь одна — неповторима,", "Смерти нет — лишь переход:", "Или в светлый мир надежды,", "Или в тёмный, смрадный грот."]]}, {"id": 54, "stanzas": [["В жизни каждого натянут", "Светлой ниточкой канат,", "И живём мы на балансе,", "За пределами преград."], ["Каждый шаг способен ввергнуть", "В бесконечный, тёмный ад", "Или жизни продолженье —", "Не ища в пути наград."], ["Так душа — канатоходец,", "Набирает опыт свой,", "Балансируя на грани", "В жизни этой, в смерти той."], ["Нас ведут — за руку держат,", "Только нужно распознать", "И идти, живя надеждой,", "Что достоин продолжать."], ["Стань адептом Равновесья,", "Жизни выдержи урок —", "И взлетишь над нитью этой,", "Как придёт заветный срок."]]}, {"id": 55, "stanzas": [["Вехи, радость, жизнь, рассветы,", "Что Собой Он воскресил,", "И в Огне горят планеты", "На орбитах Высших Сил."], ["Бесконечность мирозданья", "Ставит ум земной в тупик.", "Как осмыслить нам — букашкам —", "Этот мир и этот миг?"], ["Он — Отец миров Вселенной,", "Бесконечность, Абсолют,", "Из Себя рождая космос,", "Нам давая выбор — Путь."], ["Не осилят астрономы", "Этой меры величин.", "Вечность, Миг — творят основы", "За пределом наших сил."], ["Мы же — мелкие букашки", "На картине Бытия,", "Всё воюем за гектары", "При масштабах муравья."], ["Но юродству есть пределы —", "Не позволят просто так", "Погубить творенье Божье", "И в Игре поставят мат."], ["Бестелесные титаны", "Наблюдают за Игрой,", "И того, кто нарушает,", "Забирают в мир иной."]]}, {"id": 56, "stanzas": [["Где найти слова покоя?", "Как узнать Его пути,", "Не разбивши головою", "Стену глупости и лжи?"], ["Только жизни эхолотом", "Мы способны познавать", "Те глубины нашей плоти,", "До которых не достать."], ["Мы плывём на субмарине", "Под названием Земля,", "Погрязая в те пучины,", "Где не бросишь якоря."], ["Ведь немыслимое рядом,", "На поверхности лежит,", "И лишь всплытие покажет,", "Где маяк души сокрыт."]]}, {"id": 57, "stanzas": [["Забиваясь под подушку,", "Мы стараемся не знать", "Громкие разрывы жизни,", "От чего трясёт кровать."], ["И неведомы нам сроки", "Продолжения войны,", "Залпы те порой жестокой", "Нас пронзают тишины."], ["Стой. Задумайся. Не бойся —", "За плечи ангел бдит,", "Чрез печали и заботы", "Он с тобою говорит."], ["У него одна задача —", "Не погибла чтоб душа.", "И когда в пороках тонешь,", "Допускает он пинка."], ["Мы же мыслим: наказание —", "И не можем разглядеть", "В том спасения намёки,", "А не просто чью-то плеть."]]}, {"id": 58, "stanzas": [["Как дела, моя родная?", "Как сегодня прожит день?", "Что открыл, творил, увидел?", "Как преодолел ты лень?"], ["Никого ли не обидел?", "Не солгал, не осуждал?", "Все ли мысли ты сегодня", "Для себя отфильтровал?"], ["Не пошёл ли ты на сделку", "С искусителем сердец?", "Обнаружил ли ловушку,", "Что поставил мыслей чтец?"], ["По итогу дня получишь", "Ты оценку за урок:", "Исполнял или нарушил,", "Не читая между строк?"]]}, {"id": 59, "stanzas": [["Не посеешь в поле жизни", "Семена сорных причин —", "И не будешь есть отходы", "Урожая тёмных сил."], ["Создавай себе лужайки", "Светлых, творческих полей,", "Удобряй основы крепко,", "Поливай елеем дней."], ["И при сборе урожая,", "Что взрастил внутри сердец,", "Улыбнётся и поздравит", "Душу любящий Отец."]]}, {"id": 60, "stanzas": [["Радость сердца льётся в реки,", "Собираясь в океан,", "Жизни прожитые вехи —", "Заживление старых ран,"], ["Что в бою с посланцем ночи,", "Окровавленной душой,", "Получаем, мира хочем,", "Но не знаем — кто такой."], ["Апробацию мигренью", "Должен каждый получить,", "Чтоб не сгинуть при затмении,", "Тишины чтобы вкусить."], ["Ночью серы волки-мыши,", "Лишь огонь струится ввысь.", "Окопались наши мысли", "Среди каменных гробниц."], ["Радостью разгонишь тучи,", "Заразишь ей ближний круг,", "И согреются немало", "Тех, готовых, что зовут."]]}, {"id": 61, "stanzas": [["Окропи Его водою,", "Окорми Его огнём,", "Раствори души пределы,", "Зажигая факел в нём."], ["Он осветит путь готовых,", "Он излечит сотни ран,", "Не боясь, узрит основы", "И познает Океан."], ["Каждой каплей-человеком,", "Наполняющим Его,", "И течёт Он век за веком,", "И горит Он днём за днём."]]}, {"id": 62, "stanzas": [["Можно здесь остановиться?", "Я, пожалуй, тут сойду —", "Не готов я впредь кружиться", "С той планетой, где живу."], ["Что-то стало очень тяжко", "Понимать, куда летит", "Этот мир, не зная правил,", "А его водитель спит."], ["Ему сверху намекают,", "Что негоже за рулём", "Закрывать глаза и марить,", "Управляя кораблём."], ["Этот драйвер — наши мысли,", "Что кидаем в облака.", "Он несётся по корягам,", "Перегрелись тормоза."], ["Так ещё и в стельку пьяный,", "Чтоб не страшно было так,", "Взгляд весёлый, нос румяный —", "Едем-бредим, дальше знак:"], ["Стоп! Обрыв километровый!", "Дальше некуда рулить.", "Только взлёт или погибель —", "Начинай разумно жить!"]]}, {"id": 63, "stanzas": [["Лишь недавно, как открытие,", "Понял я один намёк:", "Как мы выглядим для вышних —", "Для меня был это шок."], ["Там не видят наши лица,", "Формы тела не важны,", "И косметика любая", "Не подходит для души."], ["Но зато легко читают", "Наши мысли и дела,", "Чувства также осязают,", "Как мы — твёрдые тела."], ["Смотрим часто в зеркала мы,", "Да вот только невдомёк,", "Что на самом деле видим", "Не себя, а лишь намёк —"], ["Временную оболочку,", "Ей недолго быть такой:", "Ведь тела наши стареют,", "Отправляясь на покой."], ["А души бессмертной облик", "Будет с нами навсегда.", "Чем мы здесь его наполним —", "Тем навеки будем там."]]}, {"id": 64, "stanzas": [["Людям нужно просто верить,", "Богу надо доверять,", "Жизни близких без сомнений —", "И тогда спокойно спать,"], ["Не забыв про покаяние,", "Про души надмирный Путь,", "Про врождённое призвание", "И прожитой жизни суть."], ["И тогда свои заботы", "Больше не заставят ныть:", "Что не вовремя и в тягость —", "Ведь по силам всё решить."]]}, {"id": 65, "stanzas": [["Ты не знаешь, где споткнулся,", "Ты не помнишь, что сказал,", "Поворот судьбы прослушал", "Или, может быть, проспал."], ["За прилогами гордыни,", "За порогами любви —", "Неопознанное счастье", "Неразгаданной души."], ["Чем богаты — видно сразу,", "Зачастую — угощать.", "И не прерваны преграды,", "И расстелена кровать…"], ["Все разверзнутые раны,", "Пропасти застывших лиц,", "Наших мыслей тараканы,", "Экипаж, что мчится вниз…"]]}, {"id": 66, "stanzas": [["Как же часто верим в сказки,", "Что придёт богатство вдруг,", "Что не нужно нам стараться", "И запачкать чистых рук,"], ["Что немыслимо коснёмся,", "Золотого мы руна.", "И без видимых усилий,", "Вдруг закончится война."], ["Что построим Вавилон мы,", "И до Неба уж рукой,", "Вдруг дотронемся в гордыне,", "Не познав расплаты бой."], ["И получим всё и сразу,", "Лишь желанье проявив,", "Падая в сливную яму,", "Покаяние забыв."], ["Осушая лжи бокалы", "И хмелея головой,", "Накрываем покрывалом", "Наготу души живой."], ["Ярмарка уродцам снится,", "Яства ломятся — столы,", "А из раны гной сочится", "Нераскаянной вины."], ["Жертвы не было как будто —", "Бога смерти на кресте,", "Воскресенья Его утро", "Лишь привиделось во сне…"]]}, {"id": 67, "stanzas": [["Сиротою неприкрытой,", "На обочине судьбы,", "Видят души в Зазеркалье", "Духи — вестники беды."], ["Беззащитны ногатою", "Нераскаянной души,", "Кормим плотью их живою,", "В бессознание спешим."], ["Проявить упорства каплю,", "Побороть сомнений жмут —", "Нужно лишь одеться в латы,", "Что нам ангелы куют."], ["Принимая — понимая", "Обессиленной душой,", "Обучают покаянию,", "Зажигают фитиль твой."]]}, {"id": 68, "stanzas": [["И не скучно вроде было,", "И не сильно я спешил", "Променять верёвку с мылом", "На раскаяние души."], ["А зачем? Ведь всё отлично,", "Удовольствий полный дом:", "Алкоголь, разврат и чувство,", "Что живём мы одним днём."], ["Так и было бы, однако", "Не погибнуть нам дают,", "А сначала горько плакать", "За жизнь лишнюю — свою."], ["И не выйдет отсидеться", "На нейтральной полосе:", "Кончилось ведь наше детство —", "Учат жить в сознанье всех."]]}, {"id": 69, "stanzas": [["В пустынях жизни каплями росы,", "Приходят в нас заложенные коды.", "Прощённой, нераскаянной души,", "Завидев мыслей каменных породы."], ["В скрижалях снов, рождаясь многословных,", "Ведём последний, экзистенциальный бой,", "Не ведав своих сил — морей безводных,", "Корней своих вычёркивая боль."], ["Раскатистой зарницей грянет гром,", "Бескрылыми покажутся те стаи,", "Что мысленно мы к дому отправляем.", "Заведомо без толку мы живём."]]}, {"id": 70, "stanzas": [["Как среди шторма сохранить рассудок,", "Когда в округе рушатся миры,", "Основы затряслись и путь столь узок", "И нет другого выхода с Земли?"], ["Лишь только доверяя Высшим Силам,", "Мы сможем этот шторм преодолеть.", "Нас проведут заветною тропою", "И вновь научат на пути взлететь"], ["Над всеми обстоятельствами жизни,", "Над горем тем, что стелется кругом.", "Доверием Ему родив надежду,", "Мы снова после бури расцветём."]]}, {"id": 71, "stanzas": [["Слёзы по щекам струятся,", "Покаяния я хлебнул,", "Перебило мне дыханье,", "Опуская в тишину."], ["Мне дают смотреть картины", "Прожитых вслепую лет,", "Где гордыня льёт стремнины", "И не ведает побед."], ["Только слёзы побеждённых", "Наполняют чашу здесь,", "И заведомо виновных", "Ставит к стенке чья-то лесть."], ["И непознанные рядом,", "И невидимые спят,", "Укрываясь одеялом", "Из построенных преград."], ["Что же будет, если чаша", "Сразу выльет этот яд", "В жизнь мою — и будет каша", "Окровавленных наград?"], ["Но одуматься не поздно,", "Если я ещё живой,", "И растопит лёд морозный", "Эликсир прощенья — боль."]]}, {"id": 72, "stanzas": [["Через реки, через горы,", "Через мысли, через горе,", "Через жизни разговоры", "Мы знакомимся с собою."], ["Каждый встречный — не случайный,", "Каждый вечер — не прощальный,", "Каждый пряник, каждый кнут —", "Всё уроки жизни тут."], ["И понять намёки — значит", "Стать счастливей, стать богаче,", "Не проспать дороги-книги,", "Не уйти без следа в жизни."]]}, {"id": 73, "stanzas": [["Ты проснулся — миг почувствуй,", "Не хватай свой телефон.", "Осознай мгновенье жизни,", "Птиц весёлый перезвон."], ["Отстранись от всех забот ты,", "Хоть минутку помолчи,", "Радости услышишь нотки,", "Осознаешь свет причин."], ["В нас заложен тот Источник,", "Что течёт с высоких сфер,", "Он подскажет и поможет", "Обрести забытый мир."], ["Почему звенят рассветы", "И зачем бегут года?", "Крутятся вокруг планеты,", "Дышит нами вся Земля."]]}, {"id": 74, "stanzas": [["Непосредственное счастье", "У детей горит в глазах —", "Ведь они ещё всё помнят,", "Но не могут рассказать."], ["Помнят жизни колыбели,", "Помнят и любовь Отца,", "В доме, где не знали горя,", "Наши детские сердца."], ["Иногда они с незримым", "Кем-то тихо говорят,", "Знают ведь, как нужно слушать,", "И горит рассветом взгляд."], ["Нужно только научиться", "У младенцев перенять", "Опыт, что забыли с детства,", "Как невидимых познать."]]}, {"id": 75, "stanzas": [["Немым укором могут быть они —", "Дорог несметных, прожитых в печали,", "Которых за собой мы оставляли,", "Забыв про смыслы — жизни вопреки."], ["Итогом может быть война с собой,", "Когда уже не видно светлой дали,", "Лишь окаянной, проклятой душой", "Во мгле животных, низменных спиралей."], ["Не нужно вновь загадки создавать,", "Ложиться спать, как вор, что ждёт расплаты.", "Прими дорогу раненой душой,", "Зажги огни, таланты распечатав."], ["Порывом ветра унесётся боль,", "Проблемы, что мешали, изнуряли,", "Завертится волною тот прибой", "И окропит водою тех, кто спали."]]}, {"id": 76, "stanzas": [["Он сказал: «Пошли со мною,", "Бросьте рыбу тут ловить.", "Сможете узнать основы,", "Душ спасенья мёд вкусить.»"], ["Побросали они сети", "И пошли тотчас за Ним,", "Семена те по планете", "Сея — нам пути открыв."], ["Тысячами лет скитаний", "Видим мы огонь внутри.", "Не важны здесь расстояния —", "Проросли семян ростки."]]}, {"id": 77, "stanzas": [["Взгляд его унылый, скользкий —", "Искусить он ждёт тебя,", "В слабостях своих погибнуть", "Не рождался чтоб дитям."], ["Свысока упал он, видев,", "Все красоты наверху,", "Позавидовал Творцу он,", "В преисподни хлынул мглу."], ["Треть служебных духов тоже", "Вместе с ним ушли во тьму", "И теперь оттуда стонут,", "Платят страшную цену."], ["Мы для них — одна отрада,", "Могут нас они достать:", "Мысли, чувства посылают", "И принять — их подпитать."], ["Кушают они те блюда,", "Что рождаем в страхе мы:", "Ненависть, уныние, злоба —", "Для них лучшие торты."], ["Будь же бдителен, вступая", "В этот сектор мыслей, чувств,", "Не оставят они зная,", "Что нажива уже тут."]]}, {"id": 78, "stanzas": [["От рассвета до заката,", "В алых, солнечных лучах,", "Нас готовят к жизни в латах,", "Защищая от облав."], ["Враг не дремлет — и не думай,", "Просто ждёт он тот момент:", "Зазеваешься, когда ты", "И весь смоешь репеллент,"], ["Не послушав наставлений,", "Как в бою не прозевать", "Тех прилогов, что готовят", "И отправят душу спать."], ["И украдкой, потихоньку", "Начинают торжество,", "Нарезают ровно столько,", "Чтоб не выдать воровство."], ["Так во «сне» плодится нечисть,", "Как присоски для души.", "Ты не чувствуешь — они же", "Продолжают тобой жить"], ["До того момента только,", "Как увидят, что пустой", "И нет смысла в продолжении —", "Отправляют на убой."]]}, {"id": 79, "stanzas": [["Шахматной доскою тонкой", "Представляю этот мир,", "И ведут игру незримо", "Жизни Свет и Зла кумир."], ["Мы — фигуры в этом матче,", "Ясно только лишь одно:", "Цвет твоей команды личной", "Выбираешь сам давно."], ["За кого вступить в сражение?", "За кого всю жизнь отдать?", "Не терзало чтоб сомненье", "Среди партии опять."], ["Стороны всего лишь две тут,", "Звон мечей стоит в веках:", "Одни лезут с подземелья,", "А другие — в облаках."], ["И игра не понарошку,", "А за жизни здесь идёт.", "Каждая фигура ценна,", "Мир меняет каждый ход."], ["Роли в партии-сраженье", "Выбирает сам народ:", "Кто Конём или Ладьёю,", "Или кто Ферзём стаёт."], ["Все по правилам играют,", "Не бывает здесь обман.", "Те, кто их не соблюдает,", "Улетает с доски сам."], ["И Гроссмейстер смотрит сверху,", "Каждый дорог ведь Ему:", "Королева или пешка —", "Лишь бы делали игру."]]}, {"id": 80, "stanzas": [["И слышу голос в сердце я: «Не бойся, сыне,", "Неведомы тебе Огня путя.", "Не утони, прошу тебя, в гордыне,", "Что всё зависит в мире от тебя."], ["Не знаешь сроков — не живи в унынии,", "Ведь волосы подсчитаны твои.", "Учись доверию: что проведут в пустыне,", "И смогут море встретить корабли."], ["Прилогов берегись и озлобления,", "Душе своей готовя ту стезю,", "Которая придёт в морях стремлений.", "Зажги звезду, как лучик кораблю.»"]]}, {"id": 81, "stanzas": [["Уйди в затвор, молитву познавая,", "Не нужно только новости читать.", "Не стань соглядатаем лени ради,", "А помоги Земле на ноги встать."], ["От каждого из нас зависит мера,", "Которой на планете все живут.", "Ведь не получишь статус кавалера —", "Здесь ордена за службу лишь дают."], ["Поэтому прими как соучастник", "Свою ответственность за мир вокруг себя", "И строй его, как опытный заказчик,", "А не песчаный замок средь дождя."]]}, {"id": 82, "stanzas": [["Твоей рукою мир сей направляем,", "Чтоб не погибнуть в шторме кораблю.", "Лишь молнии мгновенно озаряют", "Проложенный фарватер в глубину."], ["И проведёт Отец детей незримо", "Между холодных, острых жизни скал,", "На мель не сесть укажет как игриво,", "Завидев в жизни правильный причал."], ["Команду усмиряя против бунта,", "Чтоб не погибли, жажду испытав,", "Настанет в жизни солнечное утро,", "И бури след простынет, Мир призвав."]]}, {"id": 83, "stanzas": [["Мы несёмся над жизнью, лишь взгляд притупив,", "Набираясь сомнений и пота,", "И узнав ложных целей и мнимых причин", "Глубину, ощутив эхолотом."], ["И не будут без боя даны ордена,", "И не знает сомнений пехота,", "Только в жизни мелькает причина одна,", "И войне судьбы проданы лотом."], ["И цена та заплачена выше похвал,", "И уже не стареют ребята.", "Только взгляды их светятся в тех облаках,", "Что манили в полёты когда-то…"]]}, {"id": 84, "stanzas": [["Не засни на морозе — не так тут тепло,", "Чтобы бросить навеки здесь якорь.", "Нам бы сдвинуть земную железную ось", "И сместить хоть немного экватор."], ["Но нет смысла: засада ведь ждёт тут уже,", "Чтоб отведать душ свеженькой плоти.", "Набирайся терпенья, свети в темноте —", "И в борьбе сможешь выстрадать что-то."], ["Жизнь покажет, кем был и кем стал ты теперь,", "Не бросая осадков нам в очи.", "Смог ли прыгнуть в последний кипящий вагон", "Посреди ледовитой той ночи…"]]}, {"id": 85, "stanzas": [["Не срывайся ты в штопор забытых обид,", "Не гони туч несметные плато.", "Окаянную душу не стоит губить,", "Поднимая секиру на брата."], ["И в раскаянии прожито много уж лет,", "И не сохнут забытые раны,", "Предваряя расправы и смрад от вендетт —", "Ждут когда-то земные титаны."], ["А в очах — шум закатов и трепет тех лет,", "Что с тобою познали мы ливни.", "Пронеслись как комета, в аврале забыв", "Окормить душу лезвием жизни."]]}, {"id": 86, "stanzas": [["Зажигаешь ты в сердце прощенья свечу —", "Даришь миру себя неземного,", "И в молитве летишь по раскаянию лет,", "Вспоминая, что сделал плохого."], ["И не будешь потом ты за это судим,", "И не выльется в жизнь твою чаша,", "Ведь стираешь ты образы страшных причин —", "Не постигнет тебя в них расплата."], ["Сможешь сеять зерно в чистом поле души,", "Сможешь бегать с детьми по лужайкам,", "Оставляя другим разбираться в себе", "Или будешь для них провожатым…"]]}, {"id": 87, "stanzas": [["В двери кто-то стучит, не взирая на час,", "За окном видна ночь, что в зените.", "И не знаем, что совесть, пытаясь спасти,", "Направляет по правильной нити."], ["Она здесь не случайно тебя сторожит —", "Ведь как компас дана нам когда-то,", "Чтоб не сгинуть по жизни нам в чащах лесных,", "Не уснув по пути в тех закатах."], ["И, послушав её, ты найдёшь ту тропу,", "Что проложена в сердце когда-то.", "Поднимаясь по ней — потеряешь беду,", "Что хотела явиться возвратом."]]}, {"id": 88, "stanzas": [["Мироточат иконы в миру,", "Проливаясь елеем цветущим,", "Принося ту небес синеву", "И раскаянье в души зовущих."], ["Миро то нам дают не спроста,", "Согревая паломников верой.", "И во сне вдруг увидев живого Христа,", "Что приходит в твой дом — действуй смело."], ["Расскажи Ему, жил как в миру,", "Как, не зная покоя метался,", "Всё стремясь разгадать ту Игру,", "Среди главных фигур оказался."], ["И увидишь во взгляде Его,", "Что Он знал всё и ждал лишь — когда же", "Ты активнее вступишь в Игру,", "Капитаном ты став экипажа."]]}, {"id": 89, "stanzas": [["В ночь Причастия — перед — не можешь уснуть,", "Вспоминая, чем жил и чем грешен.", "В Покаянии, готовясь всю душу излить,", "Не забыв ничего, не опешив."], ["Ведь не просто так это — озвучить вину,", "Не сгореть от стыда, не заплакав,", "Осознав, что не батюшке ты признаёшь,", "А пред Богом — и очи не спрятав."], ["Кипятком вдруг на душу прольётся вода,", "Посмывав все глубокие раны.", "Лишь от чистого сердца раскаяв себя,", "Обретаешь свободу нирваны."], ["Вот теперь ты готов для принятия Христа —", "Ешь и пей Его Плоти и Крови.", "Из причастной той Чаши достанется всем,", "И незримо уйдут сердца боли."]]}, {"id": 90, "stanzas": [["Не успели отскрипеть качели", "Детства нашего — какая благодать.", "Не забудем той весны капели,", "Но пришла пора взрослее стать."], ["Принимая важные решения,", "Учат нас, чтоб жизнь свою начать,", "В этом мире поселить надежду", "И таланты в летах не проспать."], ["Так живём, взрослея, расцветая.", "Ведь не просто так костром горит", "Тех рассветов и закатов пламя —", "На Земле ленивый только спит."], ["Одеваясь в опыта те латы,", "Что сами куём в годах, прожив,", "Унося забытые когда-то", "Радости и горечь лет земных,"], ["И проснувшись от слепого плена,", "Сеем сад взрослеющей души,", "Чтоб не стать смоковницей бесплодной", "И принять наследство тех Вершин."]]}, {"id": 91, "stanzas": [["Свободой не торгуют — не подумай,", "Дана она нам свыше, не отнять.", "Когда тебя по жизни ставят в угол —", "То только, чтобы цену ей познать."], ["Не знаем, где окажемся мы завтра", "И для чего дарован данный миг.", "И только выбираясь с передряги,", "Мы узнаём покоя тихий лик."], ["Не забывай ценить и не сдавайся,", "Когда встречаешь пропасти в пути.", "Над миром светит та Звезда, с которой", "Ты сможешь все препятствия пройти."], ["По силам нашим нам дают дорогу —", "Пройдёшь, не сомневайся, не грусти.", "Начертаны высоко нам маршруты,", "Которыми должны с тобой пойти."]]}, {"id": 92, "stanzas": [["Ведь признайся себе: каждый грешен из нас,", "И летят в нас по жизни все камни.", "И уже на исходе наш прочность, запас —", "Не погибнуть нам нужно бесславно."], ["А принять аксиомой греховный наш груз,", "Не впадая в унынья море,", "Проложить кораблю только светлый лишь курс,", "Не столкнувшись со скалистым прибоем."], ["А волна шепчет смело: «Купайся во мне!»,", "Омывая душевные раны.", "Принимать покаяний рассветы в огне", "Помогают нас свыше Титаны."]]}, {"id": 93, "stanzas": [["Менделеев создал ту таблицу,", "Ньютон меру силы разгадал.", "А на что потратил ты частицу,", "Что Творец тебе по жизни дал?"], ["Преуспел ли в живописи краской?", "В звуках ли ты музыку сложил?", "Или просто спишь всю жизнь украдкой —", "Вроде как особо и не жил?"], ["Окропи свои пути талантом,", "Не забудь источник раскопать,", "И тогда насытишь мир ты краской,", "А не просто так пришёл поспать."]]}, {"id": 94, "stanzas": [["Лишь во тьме бытия мы готовы услышать Его —", "Он живёт в нашем сердце, страдая.", "И не видим мы сами дороги домой,", "Не познаем забытого Рая."], ["И горит та Звезда — да не видим её,", "Несмотря на всю боль и заботы.", "Пребываем в сознании, но не живём,", "Потому и страдаем мы плотью."], ["И причины откроются наших невзгод,", "И поймут люди — нужно как было", "Постараться успеть и начать тот полёт,", "Пока сердце ещё не остыло…"]]}, {"id": 95, "stanzas": [["Не высоко пролетела стая,", "Журавлиный клин вошёл в сердца,", "И горя // Daily poem selection by date hash
function getDailyIndex() {
  const d = new Date();
  const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  let h = 0;
  for (let i = 0; i < key.length; i++) {
    h = Math.imul(31, h) + key.charCodeAt(i) | 0;
  }
  return Math.abs(h) % POEMS.length;
}

const DAILY_IDX = getDailyIndex();
let currentIdx = DAILY_IDX;

// Render poem into element
function renderPoem(poem, el) {
  el.innerHTML = poem.stanzas.map(s =>
    `<div class="stanza">${s.map(l => `<span>${l}</span>`).join('')}</div>`
  ).join('');
}

// Format Russian date
function formatDate(date) {
  return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
}

// Update main view
function updateView(idx, animate = true) {
  const wrap = document.getElementById('poemWrap');
  const article = document.getElementById('poemArticle');
  const tag = document.getElementById('poemTag');
  const counter = document.getElementById('poemCounter');
  const actions = document.getElementById('actions');
  const todayBtn = document.getElementById('btnToday');

  const isDaily = idx === DAILY_IDX;

  if (animate) {
    wrap.classList.add('fading');
    setTimeout(() => {
      renderPoem(POEMS[idx], article);
      tag.textContent = isDaily ? 'Стих дня' : `Стих ${POEMS[idx].id} из ${POEMS.length}`;
      counter.textContent = `${idx + 1} / ${POEMS.length}`;
      wrap.classList.remove('fading');
    }, 280);
  } else {
    renderPoem(POEMS[idx], article);
    tag.textContent = isDaily ? 'Стих дня' : `Стих ${POEMS[idx].id} из ${POEMS.length}`;
    counter.textContent = `${idx + 1} / ${POEMS.length}`;
  }

  // Today button
  if (todayBtn) todayBtn.remove();
  if (!isDaily) {
    const btn = document.createElement('button');
    btn.id = 'btnToday';
    btn.className = 'btn-pill btn-today';
    btn.innerHTML = '⊙ К стиху дня';
    btn.onclick = () => { currentIdx = DAILY_IDX; updateView(DAILY_IDX); };
    actions.prepend(btn);
  }
}

function navigate(dir) {
  currentIdx = (currentIdx + dir + POEMS.length) % POEMS.length;
  updateView(currentIdx);
}

function share() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    showToast('Ссылка скопирована');
  }).catch(() => showToast('Не удалось скопировать'));
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '2rem', left: '50%', transform: 'translateX(-50%)',
    background: '#1e1c18', border: '1px solid #3a3830', color: '#e8e0d0',
    padding: '0.6rem 1.4rem', borderRadius: '99px', fontSize: '0.85rem',
    fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic',
    zIndex: '999', opacity: '0', transition: 'opacity 0.3s'
  });
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}

// Drawer
function openDrawer() {
  const body = document.getElementById('drawerBody');
  if (!body.children.length) {
    body.innerHTML = POEMS.map(p => `
      <div class="archive-poem">
        <div class="num">${String(p.id).padStart(3,'0')}</div>
        <article>${p.stanzas.map(s =>
          `<div class="stanza">${s.map(l => `<span>${l}</span>`).join('')}</div>`
        ).join('')}</article>
      </div>
    `).join('');
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
}

    document.documentElement.style.setProperty('--ink', '#e8e0d0');
    document.documentElement.style.setProperty('--ink-muted', '#7a7060');
    document.documentElement.style.setProperty('--ink-faint', '#2e2c28');
    btn.textContent = '☽';
  }
}

// Init
document.getElementById('poemDate').textContent = formatDate(new Date());
updateView(DAILY_IDX, false);
</script>
